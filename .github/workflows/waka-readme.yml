name: Waka Readme

on:
  schedule:
    # Runs daily at 00:00 UTC (09:00 KST)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_LANGUAGE: "False"
          SHOW_EDITORS: "False"
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_LOC_CHART: "False"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_TOTAL_CODE_TIME: "False"
          LOCALE: "en"
          COMMIT_BY_ME: "True"
          COMMIT_MESSAGE: "chore: update WakaTime stats"
          COMMIT_USERNAME: "KangWookOh"
          COMMIT_EMAIL: "kangwook.dev@gmail.com"

      - name: Checkout repo for post-process
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Compact commit-time chart
        run: |
          git pull --rebase origin main
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("README.md")
          src = p.read_text(encoding="utf-8")
          def shrink(line: str) -> str:
              m = re.match(r"^(\S.*?\S)\s{2,}(\d+ commits)\s{2,}(\S+)\s{2,}(\d+\.\d+ %)\s*$", line)
              if not m:
                  return line
              label, count, bar, pct = m.groups()
              short_bar = bar[:15] if len(bar) > 15 else bar
              return f"{label}  {count}  {short_bar}  {pct}"
          out = []
          in_block = False
          for line in src.splitlines():
              if "<!--START_SECTION:waka-->" in line:
                  in_block = True
              if "<!--END_SECTION:waka-->" in line:
                  in_block = False
              out.append(shrink(line) if in_block else line)
          p.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY
          if git diff --quiet README.md; then
            echo "No changes to compact"
            exit 0
          fi
          git config user.email "kangwook.dev@gmail.com"
          git config user.name "KangWookOh"
          git add README.md
          git commit -m "chore: compact waka chart layout"
          git push origin main
